name: CI

on:
  push:
    branches: [ main, develop, "feature/**", "fix/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spot-on
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: spot-on/package-lock.json

      - run: npm ci

      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spot-on
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: spot_on_test_db
        options: >-
          --health-cmd "pg_isready -U admin" --health-interval 10s
          --health-timeout 5s --health-retries 5
        ports:
          - 5434:5432
    env:
      DATABASE_URL: postgresql://admin:admin@localhost:5434/spot_on_test_db
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ci-nextauth-secret
      ALLOWED_EMAIL_DOMAIN: ualg.pt
      ALLOW_ANY_EMAIL_IN_DEV: "false"
      QR_SECRET: ci-qr-secret
      LIBRARY_CLOSING_TIME: "20:30"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: spot-on/package-lock.json

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Start test server
        run: |
          npx next dev --port 3001 --webpack &
          # Wait up to 120 s for the server to be ready
          timeout 120 bash -c 'until curl -sf http://localhost:3001 > /dev/null 2>&1; do sleep 2; done'

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    defaults:
      run:
        working-directory: spot-on
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/placeholder
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-build-secret
      ALLOWED_EMAIL_DOMAIN: ualg.pt
      QR_SECRET: ci-qr-secret
      LIBRARY_CLOSING_TIME: "20:30"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: spot-on/package-lock.json

      - run: npm ci

      - run: npm run build
