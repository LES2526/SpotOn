version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/spot-on"             
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      
  - package-ecosystem: "docker"
    directory: "/spot-on"             
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "docker"
