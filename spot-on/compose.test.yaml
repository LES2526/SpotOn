services:
  db_test:
    image: postgres:17-alpine
    container_name: spot_on_db_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: spot_on_test_db
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U admin -d spot_on_test_db"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: spot_on_mailhog_test
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_test_data:
