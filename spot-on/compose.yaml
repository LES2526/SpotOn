services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: spot_on_db
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U admin -d spot_on_db"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  web:
    build: .
    command: sh -c "rm -rf app/generated/prisma || true; npx prisma generate; until npx prisma db push; do echo 'Waiting for database...'; sleep 2; done; npx prisma db seed; npm run dev:docker"
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/spot_on_db
      NEXTAUTH_URL: http://192.168.1.75:3000
      NEXTAUTH_SECRET: "q/ap6iLt2BciK65X1IyJNxArHC5JdTx2KaR35lM0mtY="
      QR_SECRET: "N3LxlmMBZNVOmMuAbOgGHkO++icNQ2Md/ATohwaEQLM="
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
