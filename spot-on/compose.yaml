services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: spot_on_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npx prisma db push && npm run dev"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/spot_on_db
    depends_on:
      - db

volumes:
  postgres_data: